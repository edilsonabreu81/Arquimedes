<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detector Geométrico Arquimedes v3.2</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* --- MUDANÇA 1 & 2: TEMA CLARO E FONTES MAIORES --- */
  :root {
    --bg: #ffffff; /* Fundo principal claro */
    --surface: #f7fafc; /* Superfície dos controles claro */
    --accent: #2b6cb0; /* Azul escuro para contraste */
    --text: #1a202c; /* Texto escuro */
    --font-size-base: 18px; /* Fonte base maior */
  }

  body { 
    background: var(--bg); 
    color: var(--text); 
    font-family: 'Syne', sans-serif; 
    margin: 0; 
    overflow: hidden; 
    font-size: var(--font-size-base); 
  }
  
  /* --- MUDANÇA 3: IMAGEM DE FUNDO NO PAINEL --- */
  #controls { 
    position: absolute; 
    top: 20px; 
    left: 20px; 
    z-index: 10; 
    display: flex; 
    flex-direction: column; 
    gap: 15px; /* Espaçamento maior */
    width: 350px; /* Um pouco mais largo */
    padding: 30px; /* Preenchimento maior */
    border-radius: 20px; 
    border: 1px solid #e2e8f0; 
    
    /* Configuração da imagem de fundo */
    background-image: url('arquimedes.png'); /* Certifique-se que a imagem está na mesma pasta */
    background-size: cover;
    background-position: center;
    position: relative; /* Necessário para a sobreposição */
    overflow: hidden;
  }

  /* Camada de sobreposição para garantir legibilidade sobre a imagem */
  #controls::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(255, 255, 255, 0.85); /* Sobreposição branca semi-transparente */
    z-index: -1;
    border-radius: 20px;
  }
  
  h2 {
    font-size: 1.8em; /* Título maior */
    margin: 0 0 10px 0;
    color: var(--accent);
  }

  .btn { 
    padding: 15px; /* Botões maiores */
    border: none; 
    border-radius: 12px; 
    cursor: pointer; 
    font-weight: 700; /* Mais negrito */
    transition: 0.3s; 
    background: #e2e8f0; 
    color: var(--text); 
    font-size: 1.1em; /* Texto do botão maior */
  }
  .btn:hover { background: #cbd5e0; }

  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #2c5282; }

  .btn-ai { background: #805ad5; color: white; } /* Roxo ajustado para tema claro */
  .btn-ai:hover { background: #6b46c1; }
  
  canvas { cursor: crosshair; }

  #results { 
    margin-top: 20px; 
    font-size: 1.1em; /* Resultados maiores */
    line-height: 1.6; 
    background: rgba(255,255,255,0.7);
    padding: 15px;
    border-radius: 10px;
  }
</style>
</head>
<body>

<div id="controls">
    <h2>Arquimedes v3.2</h2>
    
    <div style="display: flex; gap: 10px;">
        <button class="btn" style="flex:1" onclick="setTab('image')">Imagem</button>
        <button class="btn" style="flex:1" onclick="setTab('manual')">Manual</button>
    </div>

    <div id="tab-image-controls" style="display: flex; flex-direction: column; gap: 10px;">
        <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleImage(this)">
        <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">Carregar Foto</button>
        <button class="btn btn-ai" onclick="autoDetectVertices()">✨ Detecção Automática</button>
    </div>

    <button class="btn" style="background: #fc8181; color: white;" onclick="clearAll()">Limpar Tudo</button>
    
    <div id="results">
        </div>
</div>

<canvas id="canvas"></canvas>

<script>
// O JavaScript permanece essencialmente o mesmo, com pequenas melhorias na renderização do texto.

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let State = {
    mode: 'image',
    points: [],
    image: null,
    zoom: 1,
    offset: { x: 0, y: 0 },
    scale: 1,
    isDragging: false
};

function clearAll() {
    State.points = [];
    State.image = null;
    State.scale = 1;
    document.getElementById('file-input').value = "";
    document.getElementById('results').innerHTML = "Clique na tela para adicionar vértices.";
    draw();
}

function setTab(mode) {
    State.mode = mode;
    // Ajusta visibilidade dos controles específicos
    document.getElementById('tab-image-controls').style.display = (mode === 'image') ? 'flex' : 'none';
    clearAll();
}

function handleImage(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                State.image = img;
                centerImage();
                draw();
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    }
}

function autoDetectVertices() {
    if (!State.image) return alert("Carregue uma imagem primeiro!");
    
    // Simulação simplificada para o formato atual do código
    const w = State.image.width;
    const h = State.image.height;
    
    State.points = [
        { x: w*0.25, y: h*0.3 },
        { x: w*0.75, y: h*0.2 },
        { x: w*0.7, y: h*0.8 },
        { x: w*0.3, y: h*0.7 }
    ];
    
    // Aqui chamaria a função de cálculo geométrica completa se estivesse visível
    draw();
    document.getElementById('results').innerHTML = "<strong>Detecção simulada.</strong> <br>Ajuste os pontos clicando neles (funcionalidade a implementar).";
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(State.offset.x, State.offset.y);
    ctx.scale(State.zoom, State.zoom);

    if (State.image) {
        ctx.drawImage(State.image, 0, 0);
    }

    // Desenhar Polígono
    if (State.points.length > 0) {
        ctx.beginPath();
        ctx.strokeStyle = '#2b6cb0'; // Azul para contraste no claro
        ctx.lineWidth = 4 / State.zoom; // Linha mais grossa
        ctx.moveTo(State.points[0].x, State.points[0].y);
        
        State.points.forEach((p, i) => {
            ctx.lineTo(p.x, p.y);
            
            // --- EXIBIR ÂNGULOS NOS VÉRTICES (com melhoria de visibilidade) ---
            if (State.points.length >= 3) {
                const angle = calculateAngleAtStep(i);
                
                ctx.save();
                // Sombra para o texto
                ctx.shadowColor = "rgba(0,0,0,0.8)";
                ctx.shadowBlur = 4;
                ctx.fillStyle = "#f6e05e"; // Amarelo vivo
                ctx.font = `bold ${18/State.zoom}px 'JetBrains Mono', monospace`; // Fonte maior
                ctx.fillText(`${angle.toFixed(1)}°`, p.x + 12, p.y - 12);
                ctx.restore();
            }
            
            // Desenhar Vértice
            ctx.fillStyle = "#2d3748";
            ctx.beginPath();
            ctx.arc(p.x, p.y, 6/State.zoom, 0, Math.PI*2);
            ctx.fill();
            ctx.strokeStyle = "white";
            ctx.lineWidth = 2/State.zoom;
            ctx.stroke();
        });
        
        if (State.points.length > 2) ctx.closePath();
        ctx.stroke();
    }
    ctx.restore();
}

// Função auxiliar para cálculo de ângulo
function calculateAngleAtStep(i) {
    const n = State.points.length;
    const p2 = State.points[i];
    const p1 = State.points[(i + n - 1) % n];
    const p3 = State.points[(i + 1) % n];
    
    if(!p1 || !p2 || !p3) return 0;

    const v1 = { x: p1.x - p2.x, y: p1.y - p2.y };
    const v2 = { x: p3.x - p2.x, y: p3.y - p2.y };
    
    const dot = v1.x * v2.x + v1.y * v2.y;
    const mag1 = Math.sqrt(v1.x * v1.x + v1.y * v1.y);
    const mag2 = Math.sqrt(v2.x * v2.x + v2.y * v2.y);
    
    if(mag1 * mag2 === 0) return 0;

    const cosTheta = dot / (mag1 * mag2);
    // Garante que o valor esteja no intervalo [-1, 1] para o acos
    const clampedCos = Math.max(-1, Math.min(1, cosTheta));
    return Math.acos(clampedCos) * (180 / Math.PI);
}

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    draw();
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function centerImage() {
    if(!State.image) return;
    State.zoom = Math.min(canvas.width / State.image.width, canvas.height / State.image.height) * 0.9;
    State.offset.x = (canvas.width - State.image.width * State.zoom) / 2;
    State.offset.y = (canvas.height - State.image.height * State.zoom) / 2;
}

canvas.onclick = (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left - State.offset.x) / State.zoom;
    const y = (e.clientY - rect.top - State.offset.y) / State.zoom;
    
    // Evita adicionar pontos se clicou nos controles
    if (e.clientX < 400 && e.clientY < 600) return;

    State.points.push({x, y});
    draw();
};

// Inicialização
setTab('image');
</script>

</body>
</html>
