<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Arquimedes PRO Completo</title>

<script async src="https://docs.opencv.org/4.x/opencv.js"></script>

<style>
body { font-family: Arial; text-align: center; }
canvas { border:1px solid #333; margin-top:10px; }
button { margin:5px; padding:8px; cursor:pointer; }
.tabs button { padding:10px; }
.active { background:#333; color:#fff; }
</style>
</head>

<body>

<h2>Arquimedes PRO</h2>

<div class="tabs">
  <button onclick="setTab(1)" class="active">Imagem</button>
  <button onclick="setTab(2)">Manual</button>
  <button onclick="setTab(3)">📥 Baixar</button>
  <button onclick="setTab(4)">📧 Email</button>
</div>

<!-- ABA 1 -->
<div id="aba1">
  <input type="file" id="img-upload"><br>
  <button onclick="autoDetect()">🤖 Detectar</button>
  <button onclick="calculate()">Calcular</button>
</div>

<!-- ABA 2 -->
<div id="aba2" style="display:none;">
  <button onclick="enableManual()">Adicionar Pontos</button>
</div>

<!-- ABA 3 -->
<div id="aba3" style="display:none;">
  <button onclick="downloadResult()">Baixar Resultado</button>
</div>

<!-- ABA 4 -->
<div id="aba4" style="display:none;">
  <input type="email" id="email" placeholder="Digite o email"><br>
  <button onclick="sendEmail()">Enviar Resultado</button>
</div>

<br>
<button onclick="clearAll()">Limpar</button>

<canvas id="canvas" width="700" height="450"></canvas>

<script>

let currentTab = 1;

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const State = {
  img: null,
  points: [],
  angles: [],
  manualMode: false
};

// ================= ABAS =================
function setTab(n){
  currentTab = n;
  for(let i=1;i<=4;i++){
    document.getElementById("aba"+i).style.display = "none";
  }
  document.getElementById("aba"+n).style.display = "block";
}

// ================= UPLOAD =================
document.getElementById("img-upload").addEventListener("change", e=>{
  const file = e.target.files[0];
  if(!file) return;

  const img = new Image();
  img.onload = ()=>{
    State.img = img;
    draw();
  }
  img.src = URL.createObjectURL(file);
});

// ================= LIMPAR =================
function clearAll(){
  State.img = null;
  State.points = [];
  State.angles = [];
  State.manualMode = false;

  const input = document.getElementById("img-upload");
  input.value='';
  input.type='text';
  input.type='file';

  ctx.clearRect(0,0,canvas.width,canvas.height);
}

// ================= MANUAL =================
function enableManual(){
  State.manualMode = true;
}

canvas.addEventListener("click", e=>{
  if(!State.manualMode) return;

  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  State.points.push({x,y});
  draw();
});

// ================= OPEN CV DETECÇÃO =================
function autoDetect(){

  if(!State.img){
    alert("Carregue uma imagem");
    return;
  }

  let src = cv.imread(canvas);
  let gray = new cv.Mat();
  let edges = new cv.Mat();

  cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
  cv.Canny(gray, edges, 50, 150);

  let contours = new cv.MatVector();
  let hierarchy = new cv.Mat();

  cv.findContours(edges, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

  let maxArea = 0;
  let bestContour = null;

  for(let i=0;i<contours.size();i++){
    let cnt = contours.get(i);
    let area = cv.contourArea(cnt);

    if(area > maxArea){
      maxArea = area;
      bestContour = cnt;
    }
  }

  if(bestContour){
    let approx = new cv.Mat();
    let peri = cv.arcLength(bestContour,true);
    cv.approxPolyDP(bestContour, approx, 0.02 * peri, true);

    State.points = [];

    for(let i=0;i<approx.rows;i++){
      let x = approx.data32S[i*2];
      let y = approx.data32S[i*2+1];
      State.points.push({x,y});
    }
  }

  calculate();
}

// ================= CALCULO =================
function calculate(){

  if(State.points.length < 3){
    alert("Figura inválida");
    return;
  }

  State.angles = [];

  for(let i=0;i<State.points.length;i++){
    const A = State.points[(i-1+State.points.length)%State.points.length];
    const B = State.points[i];
    const C = State.points[(i+1)%State.points.length];

    const AB = {x:A.x-B.x, y:A.y-B.y};
    const CB = {x:C.x-B.x, y:C.y-B.y};

    const dot = AB.x*CB.x + AB.y*CB.y;
    const mag1 = Math.hypot(AB.x,AB.y);
    const mag2 = Math.hypot(CB.x,CB.y);

    const angle = Math.acos(dot/(mag1*mag2))*(180/Math.PI);
    State.angles.push(angle);
  }

  draw();
}

// ================= DOWNLOAD =================
function downloadResult(){
  if(State.angles.length === 0){
    alert("Nenhum resultado");
    return;
  }

  let text = "Ângulos:\\n";
  State.angles.forEach((a,i)=>{
    text += "Vértice "+(i+1)+": "+a.toFixed(2)+"°\\n";
  });

  const blob = new Blob([text], {type:"text/plain"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "resultado.txt";
  a.click();
}

// ================= EMAIL =================
function sendEmail(){
  const email = document.getElementById("email").value;

  if(!email){
    alert("Digite um email");
    return;
  }

  let body = "Resultados:%0D%0A";

  State.angles.forEach((a,i)=>{
    body += "Vértice "+(i+1)+": "+a.toFixed(2)+"°%0D%0A";
  });

  window.location.href = `mailto:${email}?subject=Resultado Geometria&body=${body}`;
}

// ================= DRAW =================
function draw(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(State.img){
    ctx.drawImage(State.img,0,0,canvas.width,canvas.height);
  }

  if(State.points.length>0){

    ctx.beginPath();
    ctx.moveTo(State.points[0].x, State.points[0].y);

    for(let p of State.points){
      ctx.lineTo(p.x,p.y);
    }

    ctx.closePath();
    ctx.stroke();

    drawAngles();
  }
}

// ================= ANGULOS =================
function drawAngles(){

  for(let i=0;i<State.points.length;i++){

    const p = State.points[i];

    ctx.beginPath();
    ctx.arc(p.x,p.y,28,0,2*Math.PI);
    ctx.stroke();

    if(State.angles[i]){
      ctx.fillStyle = "yellow";
      ctx.font = "bold 14px Arial";
      ctx.fillText(State.angles[i].toFixed(1)+"°", p.x+10, p.y-10);
    }
  }
}

</script>

</body>
</html>
