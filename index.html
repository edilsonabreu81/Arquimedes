<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Arquimedes - Geometria Interativa</title>
    <style>
        /* Requisitos do Sistema: Resolução mínima 1024x768 [cite: 14] */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            background-color: #f4f7f6; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        /* Layout do Dashboard [cite: 18, 25] */
        .container { 
            width: 90%; 
            max-width: 1200px; 
            background: white; 
            margin: 20px; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        }

        header { border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        
        /* Canvas de Geometria Interativa [cite: 19, 64] */
        .canvas-area { position: relative; display: inline-block; width: 100%; text-align: center; }
        canvas { 
            border: 2px solid #34495e; 
            background: #ffffff; 
            cursor: crosshair; 
            max-width: 100%; 
            height: auto;
            border-radius: 4px;
        }

        /* Botões e Ações Rápidas [cite: 70, 108] */
        .controls { margin: 20px 0; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        button { 
            padding: 12px 24px; 
            font-weight: bold; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            transition: all 0.3s; 
        }
        .btn-clear { background: #e74c3c; color: white; }
        .btn-analyze { background: #3498db; color: white; }
        /* Botão de Envio solicitado */
        .btn-send { background: #27ae60; color: white; display: flex; align-items: center; gap: 8px; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }

        /* Painel de Resultados (KPIs) [cite: 30, 31, 294, 295] */
        .kpi-container { display: flex; gap: 15px; margin-top: 20px; }
        .kpi-card { 
            flex: 1; 
            background: #f8f9fa; 
            padding: 15px; 
            border-radius: 8px; 
            border-top: 4px solid #3498db; 
            text-align: center; 
        }
        .kpi-value { font-size: 1.2em; font-weight: bold; color: #2c3e50; display: block; }
        .kpi-label { font-size: 0.8em; color: #7f8c8d; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Arquimedes | <small>Geometria Interativa</small></h1>
        <p>Clique no plano para definir vértices e analisar a forma. [cite: 72, 75]</p>
    </header>

    <div class="canvas-area">
        <canvas id="arquimedesCanvas" width="800" height="500"></canvas>
    </div>

    <div class="controls">
        <button class="btn-clear" onclick="limparSistema()">Limpar Tudo</button>
        <button class="btn-analyze" onclick="processarGeometria()">Analisar Figura</button>
        <button class="btn-send" onclick="enviarResultadoEmail()">Enviar Resultado ✉️</button>
    </div>

    <div class="kpi-container">
        <div class="kpi-card">
            <span class="kpi-label">Forma</span>
            <span id="res-forma" class="kpi-value">Nenhuma</span>
        </div>
        <div class="kpi-card">
            <span class="kpi-label">Área</span>
            <span id="res-area" class="kpi-value">0.00 px²</span>
        </div>
        <div class="kpi-card">
            <span class="kpi-label">Perímetro</span>
            <span id="res-perim" class="kpi-value">0.00 px</span>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('arquimedesCanvas');
    const ctx = canvas.getContext('2d');
    let pontos = [];
    let analiseDados = null;

    // Interação de Clique [cite: 75]
    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        pontos.push({ x: e.clientX - rect.left, y: e.clientY - rect.top });
        desenhar();
    });

    function desenhar() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (pontos.length === 0) return;

        ctx.beginPath();
        ctx.moveTo(pontos[0].x, pontos[0].y);
        pontos.forEach(p => ctx.lineTo(p.x, p.y));
        if (pontos.length > 2) ctx.closePath();
        
        ctx.strokeStyle = '#3498db';
        ctx.lineWidth = 3;
        ctx.stroke();

        pontos.forEach(p => {
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
            ctx.fill();
        });
    }

    function limparSistema() {
        pontos = [];
        analiseDados = null;
        desenhar();
        document.getElementById('res-forma').innerText = "Nenhuma";
        document.getElementById('res-area').innerText = "0.00 px²";
        document.getElementById('res-perim').innerText = "0.00 px";
        console.log("Canvas Resetado conforme manual. [cite: 48]");
    }

    function processarGeometria() {
        if (pontos.length < 3) {
            alert("Erro: Verifique se existem dados cadastrados (mínimo 3 pontos). ");
            return;
        }

        // Simulação de cálculos para KPIs [cite: 295]
        const area = (pontos.length * 150.5); 
        const perim = (pontos.length * 60.2);
        const tipo = pontos.length === 3 ? "Triângulo" : pontos.length === 4 ? "Quadrilátero" : "Polígono";

        analiseDados = { tipo, area, perim };

        // Atualiza interface de Resultados [cite: 102]
        document.getElementById('res-forma').innerText = tipo;
        document.getElementById('res-area').innerText = area.toFixed(2) + " px²";
        document.getElementById('res-perim').innerText = perim.toFixed(2) + " px";
    }

    // FUNÇÃO SOLICITADA: Envio de Figura e Resultados [cite: 255, 263]
    function enviarResultadoEmail() {
        if (!analiseDados) {
            alert("Ação Requerida: Analise a figura antes de enviar o e-mail. [cite: 165]");
            return;
        }

        // 1. Gera imagem da figura (Exportação de dados [cite: 255, 283])
        const link = document.createElement('a');
        link.download = `arquimedes_analise_${analiseDados.tipo.toLowerCase()}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();

        // 2. Prepara o E-mail para o Professor Daniel
        const professorEmail = "edilsonduarte@gmail.com";
        const subject = encodeURIComponent(`Relatório Arquimedes: ${analiseDados.tipo}`);
        
        let body = `Olá, Professor.%0D%0A%0D%0A`;
        body += `Relatório de Geometria Interativa gerado no sistema Arquimedes.%0D%0A`;
        body += `--------------------------------------------------%0D%0A`;
        body += `📐 Forma: ${analiseDados.tipo}%0D%0A`;
        body += `📊 Área: ${analiseDados.area.toFixed(2)} px²%0D%0A`;
        body += `📏 Perímetro: ${analiseDados.perim.toFixed(2)} px%0D%0A`;
        body += `--------------------------------------------------%0D%0A%0D%0A`;
        body += `⚠️ INSTRUÇÃO IMPORTANTE:%0D%0A`;
        body += `A imagem da figura foi baixada automaticamente. Por favor, anexe o arquivo '${link.download}' a este e-mail antes de enviar. [cite: 89, 303]`;

        // Feedback visual e abertura do e-mail [cite: 69, 183]
        alert("Passo 1: Imagem salva nos seus downloads.\nPasso 2: O e-mail será aberto agora. Anexe o arquivo baixado!");
        window.location.href = `mailto:${professorEmail}?subject=${subject}&body=${body}`;
    }
</script>

</body>
</html>
