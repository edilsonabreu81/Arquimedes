<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Detector Geométrico Arquimedes - Oficial</title>
    <style>
        :root { --primary: #667eea; --dark: #2d3748; --success: #22c55e; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .container { width: 95%; max-width: 1100px; background: white; margin: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        header { background: var(--dark); color: white; padding: 15px; text-align: center; }
        
        .tabs { display: flex; background: #edf2f7; }
        .tab { flex: 1; padding: 15px; border: none; cursor: pointer; font-weight: bold; }
        .tab.active { background: white; color: var(--primary); border-bottom: 3px solid var(--primary); }
        
        .main-layout { display: grid; grid-template-columns: 1fr 300px; gap: 20px; padding: 20px; }
        canvas { border: 2px solid #cbd5e0; background: #fff; cursor: crosshair; max-width: 100%; height: auto; }
        
        .panel { display: flex; flex-direction: column; gap: 15px; }
        .card { background: #f8fafc; padding: 15px; border-radius: 8px; border-left: 5px solid var(--primary); font-size: 0.9em; }
        .btn { padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; text-align: center; margin-bottom: 5px; }
        .btn-blue { background: var(--primary); }
        .btn-green { background: var(--success); }
        .btn-red { background: #ef4444; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>🔍 Detector Geométrico Arquimedes</h1></header>

    <div class="tabs">
        <button id="tab1" class="tab active" onclick="setMode('image')">🖼️ Aba 1: Análise por Imagem</button>
        <button id="tab2" class="tab" onclick="setMode('manual')">✍️ Aba 2: Construção Manual</button>
    </div>

    <div class="main-layout">
        <div>
            <canvas id="canvas" width="750" height="500"></canvas>
            <div style="margin-top:10px; display:flex; gap:10px;">
                <input type="file" id="imgInput" style="display:none" accept="image/*">
                <button class="btn btn-blue" id="btnLoad" onclick="document.getElementById('imgInput').click()">📁 Carregar Imagem</button>
                <button class="btn btn-blue" onclick="definirEscala()">📏 Definir Escala</button>
                <button class="btn btn-red" onclick="resetar()">🗑️ Limpar</button>
            </div>
        </div>

        <aside class="panel">
            <div class="card">
                <strong>📊 KPIs de Análise [cite: 30]</strong>
                <div id="results">Aguardando vértices...</div>
            </div>
            <div class="card">
                <strong>📏 Escala Real [cite: 13]</strong>
                <div id="scaleTxt">1px = 1.00 unidade</div>
            </div>
            <button class="btn btn-green" onclick="baixarImg()">💾 Baixar Resultado [cite: 256]</button>
            <button class="btn btn-green" onclick="enviarEmail()">📧 Enviar Professor [cite: 191]</button>
        </aside>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let state = { mode: 'image', points: [], bg: null, pixelsPerUnit: 1, scaleMode: false, scalePts: [] };

    // Troca de Abas [cite: 17, 18, 19]
    function setMode(m) {
        state.mode = m;
        state.points = [];
        state.bg = null;
        document.getElementById('tab1').className = m==='image' ? 'tab active' : 'tab';
        document.getElementById('tab2').className = m==='manual' ? 'tab active' : 'tab';
        document.getElementById('btnLoad').style.display = m==='image' ? 'block' : 'none';
        resetar();
    }

    // Carregar Imagem [cite: 6, 64]
    document.getElementById('imgInput').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (f) => {
            const img = new Image();
            img.onload = () => { state.bg = img; render(); };
            img.src = f.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    canvas.onclick = (e) => {
        const rect = canvas.getBoundingClientRect();
        const p = { x: e.clientX - rect.left, y: e.clientY - rect.top };

        if (state.scaleMode) {
            state.scalePts.push(p);
            if (state.scalePts.length === 2) {
                let real = prompt("Valor real da escala (ex: 10cm):", "10");
                if (real) state.pixelsPerUnit = Math.sqrt((state.scalePts[1].x-state.scalePts[0].x)**2 + (state.scalePts[1].y-state.scalePts[0].y)**2) / parseFloat(real);
                state.scaleMode = false;
                document.getElementById('scaleTxt').innerText = `1un = ${state.pixelsPerUnit.toFixed(2)}px`;
            }
        } else {
            state.points.push(p);
        }
        render();
    };

    function render() {
        ctx.clearRect(0,0,750,500);
        // Malha quadriculada [cite: 14]
        ctx.strokeStyle = "#eee";
        for(let i=0; i<750; i+=25) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,500); ctx.stroke(); }
        for(let j=0; j<500; j+=25) { ctx.beginPath(); ctx.moveTo(0,j); ctx.lineTo(750,j); ctx.stroke(); }

        if (state.bg) ctx.drawImage(state.bg, 0, 0, 750, 500);

        if (state.points.length > 0) {
            ctx.beginPath(); ctx.moveTo(state.points[0].x, state.points[0].y);
            state.points.forEach(p => ctx.lineTo(p.x, p.y));
            if (state.points.length > 2) ctx.closePath();
            ctx.strokeStyle = "#667eea"; ctx.lineWidth = 3; ctx.stroke();
            state.points.forEach((p, i) => {
                ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(p.x,p.y,5,0,7); ctx.fill();
                ctx.fillStyle = "black"; ctx.fillText("V"+(i+1), p.x+7, p.y-7);
            });
        }
        analisar();
    }

    function analisar() {
        const pts = state.points;
        if (pts.length < 3) return;
        
        let perim = 0, lados = [], angulos = [];
        for (let i=0; i<pts.length; i++) {
            let p1 = pts[i], p2 = pts[(i+1)%pts.length], p0 = pts[(i-1+pts.length)%pts.length];
            let d = Math.sqrt((p2.x-p1.x)**2 + (p2.y-p1.y)**2) / state.pixelsPerUnit;
            lados.push(d); perim += d;

            // Ângulo (Produto Escalar) 
            let v1 = {x: p0.x-p1.x, y: p0.y-p1.y}, v2 = {x: p2.x-p1.x, y: p2.y-p1.y};
            let ang = Math.acos((v1.x*v2.x + v1.y*v2.y) / (Math.sqrt(v1.x**2+v1.y**2)*Math.sqrt(v2.x**2+v2.y**2))) * 180 / Math.PI;
            angulos.push(ang);
        }

        let area = 0; // Shoelace Formula [cite: 276]
        for (let i=0; i<pts.length; i++) area += (pts[i].x * pts[(i+1)%pts.length].y) - (pts[(i+1)%pts.length].x * pts[i].y);
        area = Math.abs(area) / (2 * (state.pixelsPerUnit**2));

        let tipo = pts.length === 3 ? "Triângulo" : pts.length === 4 ? "Quadrilátero" : "Polígono "+pts.length+"L";
        
        document.getElementById('results').innerHTML = `
            <b>${tipo}</b><br>Lados: ${lados.map(l=>l.toFixed(1)).join(' | ')}<br>
            Ângulos: ${angulos.map(a=>a.toFixed(0)+'°').join(' | ')}<br>
            Perímetro: ${perim.toFixed(2)}un<br>Área: ${area.toFixed(2)}un²
        `;
        state.lastData = {tipo, perim, area, lados, angulos};
    }

    function enviarEmail() {
        const d = state.lastData;
        if(!d) return alert("Analise a figura primeiro!");
        const body = `Figura: ${d.tipo}%0D%0AÁrea: ${d.area.toFixed(2)}%0D%0APerímetro: ${d.perim.toFixed(2)}%0D%0ALados: ${d.lados.map(l=>l.toFixed(1))}%0D%0AÂngulos: ${d.angulos.map(a=>a.toFixed(0))}`;
        window.location.href = `mailto:edilsonduarte@gmail.com?subject=Resultado Arquimedes&body=${body}`;
    }

    function resetar() { state.points = []; state.bg = null; render(); document.getElementById('results').innerHTML = "Limpado."; }
    function definirEscala() { state.scaleMode = true; state.scalePts = []; alert("Clique em 2 pontos na imagem para escala."); }
    function baixarImg() { const l = document.createElement('a'); l.download = 'arquimedes.png'; l.href = canvas.toDataURL(); l.click(); }

    render();
</script>
</body>
</html>
