<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arquimedes - Análise de Figuras</title>
<style>
  body { font-family: Arial; text-align: center; }
  canvas { border:1px solid #333; margin-top:10px; }
  button { margin:5px; padding:8px 12px; cursor:pointer; }
</style>
</head>
<body>

<h2>Arquimedes - Análise de Figuras</h2>

<input type="file" id="img-upload" accept="image/*">
<br>
<button onclick="clearAll()">Limpar</button>
<button onclick="autoDetectFigure()">🤖 Detectar Automaticamente</button>
<button onclick="calculateAndShow()">Calcular</button>

<br>
<canvas id="canvas" width="600" height="400"></canvas>

<script>

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const State = {
  imageObj: null,
  points: [],
  results: null
};

// ================= IMAGE LOAD =================
document.getElementById('img-upload').addEventListener('change', function(e){
  const file = e.target.files[0];
  if (!file) return;

  const img = new Image();
  img.onload = () => {
    State.imageObj = img;
    draw();
  };
  img.src = URL.createObjectURL(file);
});

// ================= CLEAR =================
function clearAll() {
  State.imageObj = null;
  State.points = [];
  State.results = null;

  document.getElementById('img-upload').value = '';

  ctx.clearRect(0,0,canvas.width,canvas.height);
}

// ================= AUTO DETECT =================
function autoDetectFigure() {
  if (!State.imageObj) {
    alert('Carregue uma imagem primeiro!');
    return;
  }

  const w = canvas.width;
  const h = canvas.height;

  State.points = [];

  const ratio = w/h;

  if (ratio > 1.2) {
    // retângulo
    State.points = [
      {x:50,y:50},
      {x:w-50,y:50},
      {x:w-50,y:h-50},
      {x:50,y:h-50}
    ];
  } else if (ratio < 0.8) {
    // triângulo
    State.points = [
      {x:w/2,y:50},
      {x:w-50,y:h-50},
      {x:50,y:h-50}
    ];
  } else {
    // quadrado
    const size = 200;
    const cx = w/2;
    const cy = h/2;

    State.points = [
      {x:cx-size/2,y:cy-size/2},
      {x:cx+size/2,y:cy-size/2},
      {x:cx+size/2,y:cy+size/2},
      {x:cx-size/2,y:cy+size/2}
    ];
  }

  calculateAndShow();
}

// ================= CALC ANGLES =================
function calculateAngles(points){
  const angles = [];

  for(let i=0;i<points.length;i++){
    const A = points[(i-1+points.length)%points.length];
    const B = points[i];
    const C = points[(i+1)%points.length];

    const AB = {x:A.x-B.x, y:A.y-B.y};
    const CB = {x:C.x-B.x, y:C.y-B.y};

    const dot = AB.x*CB.x + AB.y*CB.y;
    const mag1 = Math.hypot(AB.x,AB.y);
    const mag2 = Math.hypot(CB.x,CB.y);

    const angle = Math.acos(dot/(mag1*mag2)) * (180/Math.PI);
    angles.push(angle);
  }

  return angles;
}

function calculateAndShow(){
  if(State.points.length < 3){
    alert('Figura inválida');
    return;
  }

  State.results = {
    angles: calculateAngles(State.points)
  };

  draw();
}

// ================= DRAW =================
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(State.imageObj){
    ctx.drawImage(State.imageObj,0,0,canvas.width,canvas.height);
  }

  if(State.points.length > 0){
    ctx.beginPath();
    ctx.moveTo(State.points[0].x, State.points[0].y);

    for(let p of State.points){
      ctx.lineTo(p.x,p.y);
    }

    ctx.closePath();
    ctx.stroke();

    drawAngles();
  }
}

// ================= DRAW ANGLES =================
function drawAngles(){
  if(!State.results) return;

  const angles = State.results.angles;

  for(let i=0;i<State.points.length;i++){
    const p = State.points[i];

    ctx.beginPath();
    ctx.arc(p.x,p.y,28,0,2*Math.PI);
    ctx.stroke();

    const angleText = angles[i].toFixed(1)+'°';

    ctx.fillStyle = 'yellow';
    ctx.font = 'bold 14px Arial';
    ctx.fillText(angleText, p.x+10, p.y-10);
  }
}

</script>

</body>
</html>
