<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ferramenta Arquimedes - Geometria</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
text-align:center;
}

canvas{
border:1px solid #333;
background:white;
}

button{
padding:10px;
margin:5px;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:18px;
}

</style>

</head>

<body>

<h2>Ferramenta de Geometria - Arquimedes</h2>

<canvas id="canvas" width="600" height="400"></canvas>

<br>

<button onclick="clearPoints()">Limpar pontos</button>
<button onclick="analyze()">Analisar figura</button>

<div id="result"></div>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let points = [];

canvas.addEventListener("click",function(e){

const rect = canvas.getBoundingClientRect();

let x = e.clientX - rect.left;
let y = e.clientY - rect.top;

points.push({x:x,y:y});

drawCanvas();

});

function drawGrid(){

let size = 25;

ctx.strokeStyle="#ddd";

for(let x=0;x<canvas.width;x+=size){

ctx.beginPath();
ctx.moveTo(x,0);
ctx.lineTo(x,canvas.height);
ctx.stroke();

}

for(let y=0;y<canvas.height;y+=size){

ctx.beginPath();
ctx.moveTo(0,y);
ctx.lineTo(canvas.width,y);
ctx.stroke();

}

}

function drawCanvas(){

ctx.clearRect(0,0,canvas.width,canvas.height);

drawGrid();

ctx.fillStyle="red";

for(let p of points){

ctx.beginPath();
ctx.arc(p.x,p.y,4,0,Math.PI*2);
ctx.fill();

}

if(points.length>1){

ctx.strokeStyle="blue";
ctx.beginPath();

ctx.moveTo(points[0].x,points[0].y);

for(let i=1;i<points.length;i++){

ctx.lineTo(points[i].x,points[i].y);

}

ctx.closePath();
ctx.stroke();

}

}

function distance(a,b){

return Math.sqrt(
(a.x-b.x)**2 +
(a.y-b.y)**2
);

}

function polygonArea(pts){

let area=0;

for(let i=0;i<pts.length;i++){

let j=(i+1)%pts.length;

area += pts[i].x*pts[j].y;
area -= pts[j].x*pts[i].y;

}

return Math.abs(area/2);

}

function calculateAngles(){

let angles=[];

for(let i=0;i<points.length;i++){

let A=points[(i-1+points.length)%points.length];
let B=points[i];
let C=points[(i+1)%points.length];

let BAx=A.x-B.x;
let BAy=A.y-B.y;

let BCx=C.x-B.x;
let BCy=C.y-B.y;

let dot = BAx*BCx + BAy*BCy;

let magBA = Math.sqrt(BAx*BAx+BAy*BAy);
let magBC = Math.sqrt(BCx*BCx+BCy*BCy);

let angle = Math.acos(dot/(magBA*magBC));

angles.push(angle*180/Math.PI);

}

return angles;

}

function classifyTriangle(sides){

let [a,b,c]=sides;
let tol=0.5;

if(Math.abs(a-b)<tol && Math.abs(b-c)<tol)
return "Equilátero";

if(
Math.abs(a-b)<tol ||
Math.abs(b-c)<tol ||
Math.abs(a-c)<tol
)
return "Isósceles";

return "Escaleno";

}

function classifyTriangleAngle(angles){

let max = Math.max(...angles);

if(Math.abs(max-90)<1)
return "Triângulo Retângulo";

if(max>90)
return "Triângulo Obtusângulo";

return "Triângulo Acutângulo";

}

function classifyQuadrilateral(sides,angles){

let tol=1;

let allSidesEqual =
Math.abs(sides[0]-sides[1])<tol &&
Math.abs(sides[1]-sides[2])<tol &&
Math.abs(sides[2]-sides[3])<tol;

let allAngles90 =
Math.abs(angles[0]-90)<tol &&
Math.abs(angles[1]-90)<tol &&
Math.abs(angles[2]-90)<tol &&
Math.abs(angles[3]-90)<tol;

if(allSidesEqual && allAngles90)
return "Quadrado";

if(allAngles90)
return "Retângulo";

if(allSidesEqual)
return "Losango";

return "Quadrilátero Geral";

}

function analyze(){

if(points.length<3){

alert("Marque pelo menos 3 pontos");
return;

}

let sides=[];

for(let i=0;i<points.length;i++){

let j=(i+1)%points.length;

sides.push(
distance(points[i],points[j])
);

}

let perimeter = sides.reduce((a,b)=>a+b,0);

let area = polygonArea(points);

let angles = calculateAngles();

let html="";

html+="Perímetro: "+perimeter.toFixed(2)+"<br>";
html+="Área: "+area.toFixed(2)+"<br>";

if(points.length===3){

let type = classifyTriangle(sides);
let angleType = classifyTriangleAngle(angles);

html+="Tipo de triângulo: "+type+"<br>";
html+="Classificação angular: "+angleType+"<br>";

}

if(points.length===4){

let quad = classifyQuadrilateral(sides,angles);

html+="Tipo de quadrilátero: "+quad+"<br>";

}

document.getElementById("result").innerHTML=html;

}

function clearPoints(){

points=[];
drawCanvas();
document.getElementById("result").innerHTML="";

}

drawCanvas();

</script>

</body>
</html>
