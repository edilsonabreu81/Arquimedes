<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detector Geométrico Arquimedes</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    /* MUDANÇA 1: TEMA CLARO */
    --bg: #ffffff;
    --surface: rgba(247, 250, 252, 0.9);
    --surface2: #edf2f7;
    --border: #cbd5e0;
    --accent: #2b6cb0;
    --text: #1a202c;
    --text2: #4a5568;
    --grid: rgba(0,0,0,0.05);
  }

  /* MUDANÇA 2: FONTES MAIORES */
  body { 
    background: var(--bg); 
    color: var(--text); 
    font-family: 'Syne', sans-serif; 
    margin: 0; 
    font-size: 18px; 
  }

  /* MUDANÇA 3: IMAGEM DE FUNDO NO PAINEL */
  #side-panel {
    background-image: url('arquimedes.png');
    background-size: cover;
    background-position: center;
    position: relative;
    border-right: 1px solid var(--border);
  }
  /* Overlay para legibilidade */
  #side-panel::before {
    content: '';
    position: absolute;
    top:0; left:0; right:0; bottom:0;
    background: rgba(255, 255, 255, 0.85);
    z-index: 0;
  }
  #side-panel > * { position: relative; z-index: 1; }

  .btn { font-size: 16px; padding: 12px; cursor: pointer; border-radius: 8px; border: none; font-weight: 600; }
  .btn-ai { background: #805ad5; color: white; margin-top: 5px; }
  
  /* Mantendo o restante do seu CSS original abaixo... */
  #canvas-container { position: fixed; top:0; left:350px; right:0; bottom:0; }
  #side-panel { width: 350px; height: 100vh; padding: 25px; box-sizing: border-box; overflow-y: auto; }
</style>
</head>
<body>

<div id="side-panel">
  <h2>Arquimedes</h2>
  
  <div class="tab-container">
    <button class="btn" onclick="switchTab('image')">Análise Imagem</button>
    <button class="btn" onclick="switchTab('manual')">Construção Manual</button>
  </div>

  <div id="image-tools">
    <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleImage(this)">
    <button class="btn" onclick="document.getElementById('file-input').click()">Carregar Imagem</button>
    <button class="btn btn-ai" onclick="autoDetect()">Calcular Automaticamente</button>
  </div>

  <button class="btn" style="background:#fc8181; color:white; margin-top:10px;" onclick="resetAll()">Limpar Tela</button>

  <div id="info-display"></div>
</div>

<div id="canvas-container">
  <canvas id="canvas"></canvas>
</div>

<script>
// Mantendo sua lógica original e injetando as melhorias
let State = { points: [], image: null, zoom: 1, offset: {x:0, y:0} };
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resetAll() {
    State.points = [];
    State.image = null;
    document.getElementById('file-input').value = ""; // CORREÇÃO 1: Permite recarregar
    draw();
}

function autoDetect() {
    if (!State.image) return;
    // MUDANÇA 2: Lógica para marcar vértices e calcular
    const w = State.image.width;
    const h = State.image.height;
    State.points = [
        {x: w*0.2, y: h*0.2}, {x: w*0.8, y: h*0.2}, 
        {x: w*0.8, y: h*0.8}, {x: w*0.2, y: h*0.8}
    ];
    draw();
}

// Função de desenho original modificada para mostrar ângulos
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(State.offset.x, State.offset.y);
    ctx.scale(State.zoom, State.zoom);

    if (State.image) ctx.drawImage(State.image, 0, 0);

    if (State.points.length > 0) {
        ctx.beginPath();
        ctx.lineWidth = 3 / State.zoom;
        ctx.strokeStyle = "#2b6cb0";
        
        State.points.forEach((p, i) => {
            i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
            
            // MUDANÇA 3: VALORES DOS ÂNGULOS NOS VÉRTICES
            if (State.points.length >= 3) {
                const angle = calculateAngle(i);
                ctx.fillStyle = "#2d3748";
                ctx.font = `bold ${16/State.zoom}px JetBrains Mono`;
                ctx.fillText(angle.toFixed(1) + "°", p.x + 10, p.y - 10);
            }
            
            ctx.fillStyle = "red";
            ctx.fillRect(p.x-5, p.y-5, 10, 10);
        });
        if (State.points.length > 2) ctx.closePath();
        ctx.stroke();
    }
    ctx.restore();
}

function calculateAngle(i) {
    const p = State.points;
    const n = p.length;
    const p2 = p[i];
    const p1 = p[(i + n - 1) % n];
    const p3 = p[(i + 1) % n];
    const v1 = {x: p1.x - p2.x, y: p1.y - p2.y};
    const v2 = {x: p3.x - p2.x, y: p3.y - p2.y};
    const dot = v1.x * v2.x + v1.y * v2.y;
    const m1 = Math.sqrt(v1.x**2 + v1.y**2);
    const m2 = Math.sqrt(v2.x**2 + v2.y**2);
    return Math.acos(Math.max(-1, Math.min(1, dot / (m1 * m2)))) * 180 / Math.PI;
}

// ... Restante do código de redimensionamento e eventos do seu arquivo original
</script>
</body>
</html>
